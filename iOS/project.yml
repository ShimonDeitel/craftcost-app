name: Craftcost
options:
  bundleIdPrefix: com.shimondeitel.craftcost
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Craftcost:
    type: application
    platform: iOS
    sources:
      - path: Craftcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.craftcost
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Craftcost/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  CraftcostTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: CraftcostTests
      - path: Craftcost.storekit
    dependencies:
      - target: Craftcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.craftcost.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  CraftcostUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: CraftcostUITests
    dependencies:
      - target: Craftcost
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.craftcost.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Craftcost:
    build:
      targets:
        Craftcost: all
        CraftcostTests: [test]
        CraftcostUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Craftcost.storekit
    test:
      config: Debug
      storeKitConfiguration: Craftcost.storekit
      targets:
        - CraftcostTests
        - CraftcostUITests
    archive:
      config: Release
